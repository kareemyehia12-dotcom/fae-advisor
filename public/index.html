<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FAE Component Advisor</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #0f1117; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }
header { background: #1a1d27; padding: 16px 24px; border-bottom: 1px solid #2a2d3a; }
header h1 { font-size: 18px; font-weight: 600; color: #fff; }
header p { font-size: 13px; color: #888; margin-top: 2px; }
#chat-container { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
.message { max-width: 80%; padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; }
.user { background: #2563eb; color: #fff; align-self: flex-end; border-radius: 12px 12px 2px 12px; }
.assistant { background: #1a1d27; color: #e0e0e0; align-self: flex-start; border-radius: 12px 12px 12px 2px; border: 1px solid #2a2d3a; }
.typing { color: #888; font-style: italic; }
#input-area { padding: 16px 24px; background: #1a1d27; border-top: 1px solid #2a2d3a; display: flex; gap: 12px; }
#user-input { flex: 1; background: #0f1117; border: 1px solid #2a2d3a; color: #e0e0e0; padding: 10px 14px; border-radius: 8px; font-size: 14px; outline: none; resize: none; }
#user-input:focus { border-color: #2563eb; }
#send-btn { background: #2563eb; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 14px; }
#send-btn:hover { background: #1d4ed8; }
#reset-btn { background: transparent; color: #888; border: 1px solid #2a2d3a; padding: 10px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; }
#reset-btn:hover { color: #e0e0e0; }
</style>
</head>
<body>
<header>
<h1>FAE Component Advisor</h1>
<p>Describe your application problem and I will recommend the right component</p>
</header>
<div id="chat-container">
<div class="message assistant">Hello! I am your Field Applications Engineer. Describe your application problem in plain English and I will help you find the right component and the specs that actually matter for your use case.</div>
</div>
<div id="input-area">
<textarea id="user-input" rows="1" placeholder="Describe your application..."></textarea>
<button id="reset-btn" onclick="resetChat()">New Chat</button>
<button id="send-btn" onclick="sendMessage()">Send</button>
</div>
<script>
const chatContainer = document.getElementById("chat-container");
const userInput = document.getElementById("user-input");

userInput.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

async function sendMessage() {
  const message = userInput.value.trim();
  if (!message) return;
  addMessage(message, "user");
  userInput.value = "";
  const typing = addMessage("Thinking...", "assistant typing");
  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message })
    });
    const data = await res.json();
    typing.remove();
    addMessage(data.response, "assistant");
  } catch {
    typing.remove();
    addMessage("Error connecting to server.", "assistant");
  }
}

async function resetChat() {
  await fetch("/api/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ reset: true })
  });
  chatContainer.innerHTML = "<div class='message assistant'>Hello! I am your Field Applications Engineer. Describe your application problem in plain English and I will help you find the right component and the specs that actually matter for your use case.</div>";
}

function addMessage(text, className) {
  const div = document.createElement("div");
  div.className = "message " + className;
  div.textContent = text;
  chatContainer.appendChild(div);
  chatContainer.scrollTop = chatContainer.scrollHeight;
  return div;
}
</script>
</body>
</html>
